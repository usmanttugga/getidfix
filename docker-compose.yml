services:
  postgres:
    image: postgres:16-alpine
    container_name: getidfix-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: getidfix123
      POSTGRES_DB: getidfix_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d getidfix_dev']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: getidfix-redis
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
